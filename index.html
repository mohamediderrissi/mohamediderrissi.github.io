<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mohamed ELIDRISSI ELHASSANI - Portfolio</title>
    <meta name="description" content="Portfolio of Mohamed ELIDRISSI ELHASSANI, FullStack Engineer">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="nav-container">
            <button class="nav-toggle" id="nav-toggle" aria-label="Toggle navigation">
                <i class="fas fa-bars"></i>
            </button>
            <ul class="nav-links" id="nav-links">
                <li><a href="#hook-section">Accueil</a></li>
                <li><a href="#hero-section">À propos</a></li>
                <li><a href="#study-section">Formation</a></li>
                <li><a href="#experience-section">Expériences</a></li>
                <li><a href="#projects-section">Projets</a></li>
                <li><a href="#contact-section">Contact</a></li>
            </ul>
        </div>
    </nav>
    <div class="blueprint-overlay">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
        <div class="shape shape-4"></div>
        <div class="shape shape-5"></div>
    </div>
    <main class="container">
        <!-- Hook Section -->
        <section id="hook-section" class="bordered-section">
            <h1 class="main-title">Mohamed Elidrissi Elhassani</h1>
            <h2 class="sharp-title"><span>Ingénieur FullStack</span></h2>
            <p id="hook-text" class="hook-text"></p>
            <div class="cta-container">
                <a href="#contact-section" class="btn btn-primary"><i class="fas fa-envelope"></i> Me contacter</a>
                <a href="#hero-section" class="btn btn-secondary"><i class="fas fa-info-circle"></i> Plus
                    d'informations</a>
            </div>
        </section>

        <!-- Hero Section -->
        <section id="hero-section" class="bordered-section hero">
            <h2 class="sharp-title"><span>À propos de moi</span></h2>
            <div class="hero-content">
                <div class="hero-text">
                    <div id="about-text"></div>
                </div>
                <div class="hero-image-container">
                    <img id="hero-image" src="/images/me.png" alt="Mohamed">
                </div>
            </div>
        </section>

        <!-- Study Section -->
        <section id="study-section" class="bordered-section">
            <h2 class="sharp-title"><span>Formation Académique</span></h2>
            <div class="timeline" id="study-timeline"></div>
        </section>

        <!-- Experience Section -->
        <section id="experience-section" class="bordered-section">
            <h2 class="sharp-title"><span>Expériences Professionnelles</span></h2>
            <div class="timeline" id="experience-timeline"></div>
        </section>

        <!-- Projects Section -->
        <section id="projects-section" class="bordered-section">
            <h2 class="sharp-title"><span>Projets Personnels</span></h2>
            <div class="projects-grid" id="projects-grid"></div>
        </section>

        <!-- Contact Section -->
        <section id="contact-section" class="bordered-section">
            <h2 class="sharp-title"><span>Contact</span></h2>
            <div class="contact-container">
                <div class="contact-info" id="contact-info">
                    <!-- Injected via JS -->
                </div>

            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="js/data.js"></script>
    <script src="js/script.js"></script>
</body>

</html>
